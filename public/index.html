<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRO SHOP - Hệ Thống MMO Tối Ưu</title>
    <!-- Thư viện -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #f8fafc; }
        
        /* Glassmorphism Effect */
        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
        }

        .tab-btn { transition: all 0.3s ease; border-bottom: 3px solid transparent; }
        .tab-btn.active { border-bottom: 3px solid #3b82f6; color: #3b82f6; font-weight: bold; }

        .product-card { transition: transform 0.3s ease, box-shadow 0.3s ease; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.3); }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen pb-10">

    <!-- Header & Balance -->
    <header class="sticky top-0 z-50 glass border-b border-white/10 px-6 py-4 mb-8">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center font-bold text-xl shadow-lg shadow-blue-500/50">P</div>
                <h1 class="text-2xl font-black tracking-tighter uppercase">PRO<span class="text-blue-500">SHOP</span></h1>
            </div>
            
            <div id="user-info" class="hidden animate__animated animate__fadeIn">
                <div class="flex items-center gap-4">
                    <div class="text-right">
                        <p class="text-xs text-slate-400 uppercase font-semibold">Số dư ví</p>
                        <p class="text-blue-400 font-bold text-lg"><span id="balance">0</span> <span class="text-sm">COIN</span></p>
                    </div>
                    <button onclick="logout()" class="bg-red-500/10 hover:bg-red-500 text-red-500 hover:text-white p-2 rounded-lg transition-all">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M3 3a1 1 0 00-1 1v12a1 1 0 102 0V4a1 1 0 00-1-1zm10.293 9.293a1 1 0 001.414 1.414l3-3a1 1 0 000-1.414l-3-3a1 1 0 10-1.414 1.414L14.586 9H7a1 1 0 100 2h7.586l-1.293 1.293z" clip-rule="evenodd" />
                        </svg>
                    </button>
                </div>
            </div>

            <div id="auth-buttons">
                <button onclick="openModal('login')" class="bg-blue-600 hover:bg-blue-700 px-6 py-2 rounded-full font-bold transition-all shadow-lg shadow-blue-600/30">Đăng Nhập</button>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4">
        <!-- Tab Navigation -->
        <div class="flex overflow-x-auto gap-8 mb-8 pb-2 border-b border-white/5 scrollbar-hide">
            <button onclick="switchTab('shop')" class="tab-btn active whitespace-nowrap pb-2 flex items-center gap-2">🛒 Cửa Hàng</button>
            <button onclick="switchTab('sell-gmail')" class="tab-btn whitespace-nowrap pb-2 flex items-center gap-2">📧 Bán Gmail</button>
            <button onclick="switchTab('wallet')" class="tab-btn whitespace-nowrap pb-2 flex items-center gap-2">💳 Ví & Nạp Thẻ</button>
            <button onclick="switchTab('tasks')" class="tab-btn whitespace-nowrap pb-2 flex items-center gap-2">🔥 Nhiệm Vụ</button>
            <button onclick="switchTab('admin')" class="tab-btn whitespace-nowrap pb-2 flex items-center gap-2 text-slate-500">⚙️ Quản Trị</button>
        </div>

        <!-- Tab: Shop -->
        <section id="tab-shop" class="tab-pane active animate__animated animate__fadeIn">
            <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                <!-- Products load here -->
            </div>
        </section>

        <!-- Tab: Sell Gmail -->
        <section id="tab-sell-gmail" class="tab-pane hidden animate__animated animate__fadeInUp">
            <div class="max-w-2xl mx-auto glass p-8">
                <h2 class="text-2xl font-bold mb-2">Bán Gmail Kiếm Coin</h2>
                <p class="text-slate-400 mb-6 text-sm italic">Mỗi tài khoản hợp lệ được cộng 15 Coin vào ví.</p>
                <div class="space-y-4">
                    <input type="email" id="gmail-input" placeholder="Nhập địa chỉ Gmail..." class="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                    <button onclick="sellGmail()" class="w-full bg-indigo-600 hover:bg-indigo-700 py-4 rounded-xl font-bold transition-all">Xác Thực & Nhận Thưởng</button>
                </div>
            </div>
        </section>

        <!-- Tab: Wallet -->
        <section id="tab-wallet" class="tab-pane hidden animate__animated animate__fadeInUp">
            <div class="max-w-xl mx-auto glass p-8">
                <h2 class="text-2xl font-bold mb-6 flex items-center gap-2">💳 Nạp Thẻ Cào (Auto)</h2>
                <div class="space-y-4">
                    <select id="telco" class="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl outline-none">
                        <option value="VIETTEL">Viettel</option>
                        <option value="VINAPHONE">Vinaphone</option>
                        <option value="MOBIFONE">Mobifone</option>
                    </select>
                    <input type="text" id="card-serial" placeholder="Số Seri thẻ..." class="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl outline-none">
                    <input type="text" id="card-code" placeholder="Mã thẻ (Pin)..." class="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl outline-none">
                    <button onclick="recharge()" class="w-full bg-blue-600 hover:bg-blue-700 py-4 rounded-xl font-bold transition-all italic">Gửi Thẻ Lên Hệ Thống</button>
                </div>
            </div>
        </section>

        <!-- Tab: Tasks -->
        <section id="tab-tasks" class="tab-pane hidden animate__animated animate__fadeIn">
            <div id="task-container" class="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-4xl mx-auto">
                <!-- Tasks load here -->
            </div>
        </section>

        <!-- Tab: Admin -->
        <section id="tab-admin" class="tab-pane hidden animate__animated animate__fadeIn">
            <div class="glass p-8 space-y-8">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
                    <div class="space-y-4">
                        <h3 class="text-xl font-bold text-blue-400">📦 Thêm Hàng Mới</h3>
                        <input type="text" id="adm-pname" placeholder="Tên sản phẩm" class="w-full bg-slate-800 border border-slate-700 p-3 rounded-lg outline-none">
                        <input type="number" id="adm-pprice" placeholder="Giá (Coin)" class="w-full bg-slate-800 border border-slate-700 p-3 rounded-lg outline-none">
                        <input type="number" id="adm-pstock" placeholder="Số lượng" class="w-full bg-slate-800 border border-slate-700 p-3 rounded-lg outline-none">
                        <textarea id="adm-pcontent" placeholder="Nội dung bàn giao (link/key)" class="w-full bg-slate-800 border border-slate-700 p-3 rounded-lg outline-none h-24"></textarea>
                        <button onclick="adminAddProduct()" class="w-full bg-green-600 hover:bg-green-700 py-3 rounded-lg font-bold">Lưu Vào CSDL (SQL)</button>
                    </div>
                    <div class="space-y-4">
                        <h3 class="text-xl font-bold text-red-400">💰 Điều Chỉnh Số Dư</h3>
                        <input type="number" id="adm-uid" placeholder="ID Người dùng" class="w-full bg-slate-800 border border-slate-700 p-3 rounded-lg outline-none">
                        <input type="number" id="adm-amount" placeholder="Số xu cộng/trừ" class="w-full bg-slate-800 border border-slate-700 p-3 rounded-lg outline-none">
                        <button onclick="adminAdjustCoin()" class="w-full bg-red-600 hover:bg-red-700 py-3 rounded-lg font-bold">Cập Nhật (Redis)</button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Modal Login -->
    <div id="modal-auth" class="fixed inset-0 bg-black/80 hidden z-[100] flex items-center justify-center p-4">
        <div class="glass max-w-md w-full p-8 relative animate__animated animate__zoomIn">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-slate-500 hover:text-white">✕</button>
            <h2 id="modal-title" class="text-3xl font-black mb-6 text-center italic">ĐĂNG NHẬP</h2>
            <div class="space-y-4">
                <input type="text" id="auth-user" placeholder="Tên đăng nhập..." class="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl outline-none">
                <input type="password" id="auth-pass" placeholder="Mật khẩu..." class="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl outline-none">
                <button id="btn-auth-action" onclick="handleAuth()" class="w-full bg-blue-600 py-4 rounded-xl font-bold shadow-lg shadow-blue-600/20">BẮT ĐẦU</button>
                <p id="auth-switch" class="text-center text-sm text-slate-400 cursor-pointer hover:text-white" onclick="toggleAuthMode()">Chưa có tài khoản? Đăng ký ngay</p>
            </div>
        </div>
    </div>

    <script>
        let IS_LOGIN_MODE = true;
        let TOKEN = localStorage.getItem('token');
        let ADMIN_KEY = localStorage.getItem('admin_key') || "";

        // Chuyển Tab
        function switchTab(tabName) {
            document.querySelectorAll('.tab-pane').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            
            document.getElementById(`tab-${tabName}`).classList.remove('hidden');
            event.target.classList.add('active');

            if(tabName === 'shop') loadProducts();
            if(tabName === 'tasks') loadTasks();
            if(tabName === 'admin' && !ADMIN_KEY) askAdminKey();
        }

        // Mở Modal
        function openModal(mode) {
            document.getElementById('modal-auth').classList.remove('hidden');
            document.getElementById('modal-auth').classList.add('flex');
        }

        function closeModal() {
            document.getElementById('modal-auth').classList.add('hidden');
            document.getElementById('modal-auth').classList.remove('flex');
        }

        function toggleAuthMode() {
            IS_LOGIN_MODE = !IS_LOGIN_MODE;
            document.getElementById('modal-title').innerText = IS_LOGIN_MODE ? "ĐĂNG NHẬP" : "ĐĂNG KÝ";
            document.getElementById('auth-switch').innerText = IS_LOGIN_MODE ? "Chưa có tài khoản? Đăng ký" : "Đã có tài khoản? Đăng nhập";
        }

        // Logic API
        const api = axios.create({ baseURL: '/api' });
        if (TOKEN) api.defaults.headers.common['Authorization'] = `Bearer ${TOKEN}`;

        async function handleAuth() {
            const username = document.getElementById('auth-user').value;
            const password = document.getElementById('auth-pass').value;
            const endpoint = IS_LOGIN_MODE ? '/login' : '/signup';
            
            try {
                const res = await api.post(endpoint, { username, password });
                if (IS_LOGIN_MODE) {
                    localStorage.setItem('token', res.data.token);
                    location.reload();
                } else {
                    Swal.fire("Thành công", "Đã tạo tài khoản, hãy đăng nhập", "success");
                    toggleAuthMode();
                }
            } catch (e) { Swal.fire("Lỗi", e.response.data.error, "error"); }
        }

        async function loadProducts() {
            const res = await api.get('/shop');
            const grid = document.getElementById('product-grid');
            grid.innerHTML = res.data.map(p => `
                <div class="glass p-5 product-card animate__animated animate__fadeIn">
                    <div class="text-xs text-blue-400 font-bold uppercase mb-2">${p.category}</div>
                    <h3 class="text-lg font-bold mb-1">${p.name}</h3>
                    <div class="text-2xl font-black text-white mb-4">${p.price_coin} <span class="text-sm text-slate-500 font-normal">Coin</span></div>
                    <div class="flex justify-between items-center text-xs text-slate-500 mb-4">
                        <span>📦 Kho: ${p.stock}</span>
                        <span>⭐ Chất lượng cao</span>
                    </div>
                    <button onclick="buyProduct(${p.id})" class="w-full bg-white/5 hover:bg-blue-600 border border-white/10 py-2 rounded-lg transition-all font-semibold">Mua Ngay</button>
                </div>
            `).join('');
        }

        async function loadTasks() {
            const res = await api.get('/tasks');
            const container = document.getElementById('task-container');
            container.innerHTML = `
                <div class="col-span-full glass p-4 mb-4 border-l-4 border-yellow-500">
                    🌟 Tiến độ: ${res.data.completedToday}/4 nhiệm vụ đã làm.
                </div>
            ` + res.data.links.map(t => `
                <div class="glass p-6 flex justify-between items-center border border-white/5">
                    <div>
                        <h4 class="font-bold text-lg text-white">${t.name || t.provider}</h4>
                        <p class="text-green-400 text-sm font-bold">+30 COIN / Lượt</p>
                    </div>
                    <a href="${t.url}" target="_blank" class="bg-blue-600 hover:bg-blue-700 px-6 py-2 rounded-xl font-bold shadow-lg shadow-blue-600/20 transition-all">Làm Ngay</a>
                </div>
            `).join('');
        }

        async function sellGmail() {
            const email = document.getElementById('gmail-input').value;
            try {
                const res = await api.post('/sell-gmail', { email });
                Swal.fire("Thành công", res.data.message, "success");
                updateBalance();
            } catch (e) { Swal.fire("Lỗi", "Gmail không hợp lệ hoặc đã tồn tại", "error"); }
        }

        function askAdminKey() {
            Swal.fire({
                title: '🔑 Admin Access',
                input: 'password',
                inputPlaceholder: 'Nhập Admin Key...',
                showCancelButton: true
            }).then(res => {
                if (res.value) {
                    ADMIN_KEY = res.value;
                    localStorage.setItem('admin_key', ADMIN_KEY);
                    api.defaults.headers.common['x-admin-key'] = ADMIN_KEY;
                } else { switchTab('shop'); }
            });
        }

        async function adminAddProduct() {
            const data = {
                name: document.getElementById('adm-pname').value,
                price: document.getElementById('adm-pprice').value,
                stock: document.getElementById('adm-pstock').value,
                content: document.getElementById('adm-pcontent').value
            };
            try {
                await api.post('/admin/product', data, { headers: { 'x-admin-key': ADMIN_KEY }});
                Swal.fire("Xong", "Đã thêm hàng vào SQL", "success");
            } catch (e) { Swal.fire("Lỗi", "Sai Admin Key hoặc CSDL lỗi", "error"); }
        }

        async function updateBalance() {
            if (!TOKEN) return;
            const res = await api.get('/user/me');
            document.getElementById('balance').innerText = res.data.balance;
            document.getElementById('user-info').classList.remove('hidden');
            document.getElementById('auth-buttons').classList.add('hidden');
        }

        function logout() { localStorage.clear(); location.reload(); }

        // Khởi chạy
        if (TOKEN) updateBalance();
        loadProducts();

    </script>
</body>
</html>
